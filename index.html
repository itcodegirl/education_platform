<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#08080f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f8" media="(prefers-color-scheme: light)" />
    <meta name="description" content="CodeHerWay — A coding education platform for women in tech. Learn HTML, CSS, JavaScript, and React with an AI tutor, code editor, and auto-graded challenges." />
    <meta name="keywords" content="learn to code, women in tech, HTML, CSS, JavaScript, React, coding bootcamp, free coding course" />

    <!-- Open Graph -->
    <meta property="og:title" content="CodeHerWay — Learn. Build. Ship." />
    <meta property="og:description" content="Where women code, lead, and rewrite the future of tech." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codeherway.com" />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeHerWay — Learn. Build. Ship." />
    <meta name="twitter:description" content="Where women code, lead, and rewrite the future of tech." />
    <meta name="twitter:image" content="/og-image.svg" />

    <title>CodeHerWay — Learn. Build. Ship.</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts are self-hosted via @fontsource, so no font CDN preconnects. -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Critical CSS — prevent FOUC (Flash of Unstyled Content) -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #08080f; color: #e0e0ec; }
      body { font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; min-height: 100dvh; }
      .loading-screen {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; min-height: 100dvh; background: #08080f;
      }
      .loading-pulse { text-align: center; animation: pulse 1.5s ease-in-out infinite; }
      .loading-bolt { font-size: 48px; display: block; margin-bottom: 16px; }
      .loading-pulse p { color: #8888a8; font-size: 14px; }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the PWA service worker and auto-refresh once when a new one takes over.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          let refreshing = false;

          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });

          try {
            const reg = await navigator.serviceWorker.register('/sw.js', {
              updateViaCache: 'none',
            });

            console.log('SW registered:', reg.scope);
            reg.update().catch((err) => {
              console.log('SW update skipped:', err);
            });

            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            reg.addEventListener('updatefound', () => {
              const worker = reg.installing;
              if (!worker) return;

              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          } catch (err) {
            console.log('SW registration failed:', err);
          }
        });
      }
    </script>
  </body>
</html>
