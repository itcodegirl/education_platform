<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="application-name" content="CodeHerWay" />
    <meta name="apple-mobile-web-app-title" content="CodeHerWay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#08080f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f8" media="(prefers-color-scheme: light)" />
    <meta name="description" content="CodeHerWay - a free, browser-based coding bootcamp for women who learn by building real projects with an AI tutor, live code editor, and auto-graded challenges." />
    <meta name="keywords" content="learn to code, women in tech, HTML, CSS, JavaScript, React, coding bootcamp, free coding course, AI tutor" />
    <meta name="author" content="CodeHerWay" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical - avoid duplicate-content hits when the site is
         reachable via both CodeHerWay.com and the netlify preview URL. -->
    <link rel="canonical" href="https://codeherway.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="CodeHerWay - Learn. Build. Ship." />
    <meta property="og:description" content="A free, browser-based coding bootcamp for women who learn by building real projects. HTML -> CSS -> JavaScript -> React, with an AI tutor and a real code editor." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://codeherway.com/" />
    <meta property="og:image" content="https://codeherway.com/og-image.svg" />
    <meta property="og:image:alt" content="CodeHerWay logo - a cyan angle-bracket wrapping the word 'Her' in pink-purple gradient" />
    <meta property="og:site_name" content="CodeHerWay" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeHerWay - Learn. Build. Ship." />
    <meta name="twitter:description" content="A free, browser-based coding bootcamp for women who learn by building real projects. HTML -> CSS -> JavaScript -> React, with an AI tutor and a real code editor." />
    <meta name="twitter:image" content="https://codeherway.com/og-image.svg" />
    <meta name="twitter:image:alt" content="CodeHerWay logo" />

    <title>CodeHerWay - Learn. Build. Ship.</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json?v=8" />

    <!-- JSON-LD structured data: EducationalOrganization + WebSite.
         Helps search engines present the right knowledge-panel chips
         and enables sitelinks in Google results. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "EducationalOrganization",
          "@id": "https://codeherway.com/#org",
          "name": "CodeHerWay",
          "url": "https://codeherway.com/",
          "logo": "https://codeherway.com/icon.svg",
          "description": "A free, browser-based coding bootcamp for women who learn by building real projects. HTML, CSS, JavaScript, and React with an AI tutor and live code editor.",
          "sameAs": [
            "https://github.com/itcodegirl/education_platform"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://codeherway.com/#website",
          "url": "https://codeherway.com/",
          "name": "CodeHerWay",
          "inLanguage": "en-US",
          "publisher": { "@id": "https://codeherway.com/#org" }
        }
      ]
    }
    </script>

    <!-- Fonts are self-hosted via @fontsource, so no font CDN preconnects. -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

    <!-- Critical CSS - prevent FOUC (Flash of Unstyled Content) -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #08080f; color: #e0e0ec; }
      body { font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; min-height: 100dvh; }
      .loading-screen {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; min-height: 100dvh; background: #08080f;
      }
      .loading-pulse { text-align: center; animation: pulse 1.5s ease-in-out infinite; }
      .loading-pulse p { color: #8888a8; font-size: 14px; }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <!-- Main app entry. SW registration is imported from
         src/lib/registerSW.js inside main.jsx, so it's served from
         our own origin and passes the strict CSP `script-src 'self'`.
         The old inline SW registration was blocked on every page
         load, which also prevented SW updates from taking effect. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
