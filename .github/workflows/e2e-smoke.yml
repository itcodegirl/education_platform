name: E2E Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_AUTH_REQUIRED: 'true'
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || '' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL || '' }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || '' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Preflight authenticated E2E Supabase config
        run: npm run test:e2e:auth:preflight

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e:smoke

      - name: Upload Playwright failure artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-e2e-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
