name: CI Smoke Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: ${{ vars.E2E_SUPABASE_URL || 'http://127.0.0.1:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.E2E_SUPABASE_ANON_KEY || 'example-anon-key' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL || '' }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD || '' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run check:ci (lint, build, bundle budget, unit, e2e)
        run: npm run check:ci

  policy-integration:
    name: Supabase policy integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.POLICY_SUPABASE_URL || '' }}
      SUPABASE_ANON_KEY: ${{ secrets.POLICY_SUPABASE_ANON_KEY || '' }}
      SUPABASE_SERVICE_KEY: ${{ secrets.POLICY_SUPABASE_SERVICE_KEY || '' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase policy integration checks
        run: npm run test:policy
