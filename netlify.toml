[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Caching Headers ─────────────────────────

# Hashed JS/CSS assets — immutable, cache for 1 year
# Vite adds content hashes to filenames (e.g., index-BIcp_ZI9.js)
# so they're safe to cache forever — new deploys get new hashes
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — cache for 1 year (they never change)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 30 days
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# index.html — never cache (always get latest deploy)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
#
# CSP notes:
#  - Monaco Editor is now bundled via Vite (see src/lib/monacoLoader.js),
#    so `https://cdn.jsdelivr.net` is no longer needed anywhere in this
#    policy. Monaco still calls `new Function()` internally for its
#    language services, so 'unsafe-eval' remains in script-src until
#    someone verifies the editors work without it on a preview deploy.
#  - Monaco spawns language workers via `new Worker(new URL(…))` from
#    Vite-bundled chunks on the same origin, so worker-src needs 'self';
#    blob: is kept as a defensive fallback for any worker code that
#    Monaco may wrap in a blob URL.
#  - Supabase client talks to *.supabase.co over HTTPS + WSS (realtime).
#  - OpenAI is never called from the browser — only from netlify/functions/ai.js
#    — so api.openai.com is intentionally absent from connect-src.
#  - Lesson previews are rendered with <iframe srcDoc=… sandbox="allow-scripts">,
#    which inherits the parent's origin and doesn't need a frame-src exception.
#
# NEXT TIGHTENING STEP (not yet active — needs preview verification):
# Once a preview deploy confirms Monaco's TypeScript language service
# still works without 'unsafe-eval', swap script-src down to:
#   script-src 'self' 'wasm-unsafe-eval';
# Test matrix for that change:
#   1. Open every code-editor surface (CodePreview "Editor" tab,
#      CodeChallenge, Lesson Builder code view) with DevTools open.
#      No "Refused to execute inline script because it violates CSP"
#      warnings should appear.
#   2. In CodePreview, edit JS code and confirm the iframe preview
#      still renders output and Monaco still highlights syntax.
#   3. Check a CodeChallenge with hints — tab completion and linting
#      should still work.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
