[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Caching Headers ─────────────────────────

# Hashed JS/CSS assets — immutable, cache for 1 year
# Vite adds content hashes to filenames (e.g., index-BIcp_ZI9.js)
# so they're safe to cache forever — new deploys get new hashes
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — cache for 1 year (they never change)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 30 days
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# index.html — never cache (always get latest deploy)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
#
# CSP notes:
#  - Monaco Editor is lazy-loaded by @monaco-editor/react from cdn.jsdelivr.net
#    and uses `new Function()` internally, so script-src needs that host plus
#    'unsafe-eval' (and 'wasm-unsafe-eval' for its WASM paths).
#  - Monaco spawns language workers via blob: URLs, hence worker-src blob:.
#  - Supabase client talks to *.supabase.co over HTTPS + WSS (realtime).
#  - OpenAI is never called from the browser — only from netlify/functions/ai.js
#    — so api.openai.com is intentionally absent from connect-src.
#  - Lesson previews are rendered with <iframe srcDoc=…>, which inherits the
#    parent's origin and doesn't need a frame-src exception.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
