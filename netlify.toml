[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Streak reminder — runs daily at 6pm UTC (1pm CT)
[functions."streak-reminder"]
  schedule = "0 18 * * *"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Caching Headers ─────────────────────────

# Hashed JS/CSS assets — immutable, cache for 1 year
# Vite adds content hashes to filenames (e.g., index-BIcp_ZI9.js)
# so they're safe to cache forever — new deploys get new hashes
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts — cache for 1 year (they never change)
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — cache for 30 days
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# index.html — never cache (always get latest deploy)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
#
# Content-Security-Policy notes:
# - 'wasm-unsafe-eval' is required by the Monaco editor's tokenizer.
# - 'unsafe-inline' for style-src is needed because Google Fonts injects
#   inline <style> blocks and because Vite inlines critical CSS in index.html.
#   If we self-host fonts and move critical CSS to a file, we can drop it.
# - connect-src allows Supabase (auth + REST + realtime) and our own
#   Netlify Functions (same-origin, covered by 'self').
# - frame-src 'self' is enough for the learner-code iframe because it
#   uses srcDoc, which inherits the parent origin.
# - frame-ancestors 'none' matches X-Frame-Options: DENY.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=(), hid=(), display-capture=(), publickey-credentials-get=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Fonts are self-hosted via @fontsource packages, so neither
    # fonts.googleapis.com nor fonts.gstatic.com are allowlisted here.
    # 'unsafe-inline' remains in style-src because React's inline
    # style={...} props compile to style attributes, which the browser
    # treats as inline styles.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"

