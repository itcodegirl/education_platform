<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Error Boundaries with Lazy Loading</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    button {
      background: #2196f3;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      margin: 4px;
    }
    button:hover { background: #1976d2; }
    .page {
      background: white;
      padding: 30px;
      border-radius: 8px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: #666;
      background: white;
      border-radius: 8px;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2196f3;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    pre {
      background: #000;
      color: #0f0;
      padding: 15px;
      border-radius: 4px;
      overflow: auto;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Error Boundary - catches errors in child components
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, errorInfo) {
        console.error('Error caught by boundary:', error, errorInfo);
      }

      reset = () => {
        this.setState({ hasError: false, error: null });
        if (this.props.onReset) {
          this.props.onReset();
        }
      };

      render() {
        if (this.state.hasError) {
          return (
            <div style={{
              padding: '40px',
              background: '#ffebee',
              borderRadius: '8px',
              border: '2px solid #f44336'
            }}>
              <h2>❌ Failed to Load Component</h2>
              <p>There was an error loading this component.</p>
              <p style={{ color: '#666', fontSize: '14px' }}>
                <code>{this.state.error && this.state.error.message}</code>
              </p>

              <button
                onClick={this.reset}
                style={{
                  background: '#f44336',
                  marginTop: '15px'
                }}
              >
                Retry
              </button>
            </div>
          );
        }

        return this.props.children;
      }
    }

    // Component that might fail to load (50% chance)
    const makeUnreliableComponent = () => React.lazy(() => {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          if (Math.random() > 0.5) {
            resolve({
              default: () => (
                <div className="page">
                  <h2>✅ Success!</h2>
                  <p>Component loaded successfully.</p>
                  <p>You got lucky this time. Try again!</p>
                </div>
              )
            });
          } else {
            reject(new Error('Network error: Failed to fetch component chunk'));
          }
        }, 1000);
      });
    });

    function App() {
      const [showComponent, setShowComponent] = React.useState(false);
      const [attemptKey, setAttemptKey] = React.useState(0);

      // Recreate the lazy component each attempt so a new Promise is generated
      const UnreliableComponent = React.useMemo(() => makeUnreliableComponent(), [attemptKey]);

      const tryAgain = () => {
        setShowComponent(false);
        setAttemptKey(prev => prev + 1);
        setTimeout(() => setShowComponent(true), 50);
      };

      return (
        <div>
          <h1>🛡️ Error Boundaries with Lazy Loading</h1>

          <div style={{ background: '#fff3e0', padding: '20px', borderRadius: '8px', margin: '20px 0' }}>
            <h3>What this demonstrates:</h3>
            <ul>
              <li>Lazy loading can fail (network issues, 404, etc.)</li>
              <li>Without an error boundary → white screen of death</li>
              <li>With an error boundary → graceful error UI</li>
              <li>User can retry loading</li>
            </ul>
          </div>

          <button onClick={() => { setShowComponent(true); }}>
            Load Component (50% chance of failure)
          </button>

          <button onClick={tryAgain} style={{ background: '#ff9800' }}>
            Try Again (New Attempt)
          </button>

          {showComponent && (
            <ErrorBoundary key={attemptKey} onReset={tryAgain}>
              <React.Suspense fallback={
                <div className="loading">
                  <div className="spinner"></div>
                  <p>Loading...</p>
                </div>
              }>
                <UnreliableComponent />
              </React.Suspense>
            </ErrorBoundary>
          )}

          <div style={{ marginTop: '30px', padding: '20px', background: '#e8f5e9', borderRadius: '8px' }}>
            <h3>✅ Best Practice:</h3>
            <p>Always wrap lazy components with both Suspense AND ErrorBoundary:</p>
            <pre>{`<ErrorBoundary>
  <Suspense fallback={<Loading />}>
    <LazyComponent />
  </Suspense>
</ErrorBoundary>`}</pre>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
